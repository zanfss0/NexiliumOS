---
# IMPORTANTE: propositalmente SEM fallback "file://" local.
# Se houvesse um fallback local, a página apareceria mesmo sem internet,
# o que não é o comportamento pedido. Com required: false, se o Calamares
# não conseguir baixar essa URL (offline), a página inteira é pulada
# automaticamente e o instalador segue com o KDE Plasma que já vem no
# squashfs (offline install).
#
# Troque essa URL pro raw do SEU repositório/branch se mudar de nome.
groupsUrl:
    - "https://raw.githubusercontent.com/zanfss0/NexiliumOS/main/config/calamares/modules/netinstall.yaml"

required: false
sidebar: true


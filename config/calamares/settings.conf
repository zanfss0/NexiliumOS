---
modules-search: [ local ]

instances: []

sequence:
- show:
  - welcome
  - locale
  - keyboard
  - partition
  # netinstall entra aqui: se detectar internet, mostra o seletor de
  # desktop; se não, o próprio módulo se esconde (required: false no
  # netinstall.conf) e o instalador segue direto pro KDE Plasma do squashfs.
  - netinstall
  - users
  - summary
- exec:
  - partition
  - mount
  - unpackfs
  - machineid
  - fstab
  - locale
  - keyboard
  - localecfg
  - users
  - displaymanager
  - networkcfg
  - hwclock
  - services-systemd
  # packages aplica tanto os pacotes "fixos" quanto os que o netinstall
  # selecionou (instalação e, quando prefixado com "-", remoção).
  - packages
  - grubcfg
  - bootloader
  - umount
- show:
  - finished

branding: nexiliumos
prompt-install: false
dont-chroot: false
oem-setup: false
disable-cancel: false
disable-cancel-during-exec: false
quit-at-end: false

